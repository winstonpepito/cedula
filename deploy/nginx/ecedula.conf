# eCedula — Nginx (production)
#
# Install:
#   sudo cp deploy/nginx/ecedula.conf /etc/nginx/sites-available/ecedula
#   sudo ln -sf /etc/nginx/sites-available/ecedula /etc/nginx/sites-enabled/ecedula
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then enable HTTPS:
#   sudo certbot --nginx -d ecedula.com -d www.ecedula.com
#
# Adjust paths / PHP socket if your server layout differs.

server {
    listen 80;
    listen [::]:80;
    server_name ecedula.com www.ecedula.com;

    # React SPA build
    root /var/www/ecedula/frontend/dist;
    index index.html;

    client_max_body_size 12M;

    # Security headers (basic)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Laravel API (routes are prefixed with /api)
    location ^~ /api {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/ecedula/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/ecedula/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 120s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Sanctum CSRF cookie endpoint
    location ^~ /sanctum {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/ecedula/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/ecedula/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # Public storage (payment proofs are private; landing images use this)
    location ^~ /storage/ {
        alias /var/www/ecedula/backend/public/storage/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Laravel health check
    location = /up {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/ecedula/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/ecedula/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # Static assets from Vite build (long cache)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}
